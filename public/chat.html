<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phòng chat</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(124, 60, 255, 0.45), transparent 32%),
        radial-gradient(circle at bottom right, rgba(0, 212, 255, 0.28), transparent 34%),
        #070816;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .chat-page {
      width: min(950px, 100%);
      height: min(760px, 92vh);
      border-radius: 30px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(22px);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 22px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .chat-header h1 {
      margin: 0;
      font-size: 28px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-toggle-btn {
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: white;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      transition: 0.2s;
    }

    .search-toggle-btn:hover,
    .search-toggle-btn.active {
      background: rgba(0, 212, 255, 0.22);
      border-color: rgba(0, 212, 255, 0.35);
    }

    .back-btn {
      text-decoration: none;
      color: white;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: bold;
      white-space: nowrap;
    }

    .name-box {
      padding: 14px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
    }

    .name-box label {
      font-weight: bold;
      color: #dce6ff;
      white-space: nowrap;
    }

    .name-box input,
    .search-box input,
    .chat-input textarea {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      outline: none;
    }

    .name-box input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 15px;
    }

    .search-box {
      padding: 12px 18px;
      display: none;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
    }

    .search-box.show {
      display: flex;
    }

    .search-box input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 14px;
    }

    .search-box button {
      border: none;
      padding: 0 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .search-box button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .date-separator {
      align-self: center;
      margin: 14px 0;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: #dce6ff;
      font-size: 13px;
      font-weight: bold;
    }

    .message-row {
      max-width: min(78%, 720px);
      display: flex;
      flex-direction: column;
    }

    .message-row.mine {
      align-self: flex-end;
      text-align: right;
    }

    .message-row.other {
      align-self: flex-start;
      text-align: left;
    }

    .message-line {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .message-row.mine .message-line {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, #7c3cff, #00d4ff);
      box-shadow: 0 8px 24px rgba(0, 212, 255, 0.25);
    }

    .message-content {
      display: flex;
      flex-direction: column;
      position: relative;
      min-width: 0;
      max-width: 100%;
      width: fit-content;
    }

    .message-row.mine .message-content {
      align-items: flex-end;
    }

    .message-row.other .message-content {
      align-items: flex-start;
    }

    .message-meta {
      font-size: 12px;
      color: #b7c3e8;
      margin-bottom: 5px;
      padding: 0 6px;
    }

    .reply-preview {
      max-width: 100%;
      margin-bottom: 8px;
      padding: 9px 11px;
      border-left: 3px solid #00d4ff;
      background: rgba(0, 212, 255, 0.12);
      border-radius: 12px;
      color: #dff8ff;
      font-size: 13px;
      line-height: 1.4;
      cursor: pointer;
      text-align: left;
      overflow-wrap: anywhere;
    }

    .reply-preview strong {
      color: #8eeaff;
    }

    .bubble-wrap {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }

    .bubble {
      display: inline-block;
      width: auto;
      max-width: 100%;
      min-width: 64px;
      padding: 14px 18px;
      border-radius: 16px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      text-align: left;
    }

    .mine .bubble {
      background: linear-gradient(135deg, #7c3cff, #00d4ff);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .other .bubble {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #f5f7ff;
      border-bottom-left-radius: 6px;
    }

    .message-reactions {
      position: absolute;
      bottom: -13px;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      z-index: 5;
      pointer-events: auto;
      width: max-content;
      max-width: 220px;
    }

    .message-row.other .message-reactions {
      right: 4px;
      left: auto;
      justify-content: flex-end;
    }

    .message-row.mine .message-reactions {
      left: 4px;
      right: auto;
      justify-content: flex-start;
    }

    .reaction-count {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: 0.18s;
    }

    .reaction-count:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: translateY(-1px);
    }

    .message-tools {
      margin-top: 5px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-3px);
      transition: 0.18s ease;
      white-space: nowrap;
    }

    .message-row.has-reactions .message-tools {
      margin-top: 18px;
    }

    .message-row:hover .message-tools {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .reply-message-btn,
    .edit-message-btn,
    .delete-message-btn,
    .reaction-open-btn {
      cursor: pointer;
      transition: 0.2s;
    }

    .reply-message-btn {
      border: none;
      background: rgba(255, 255, 255, 0.12);
      color: #eaf6ff;
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      margin-right: 6px;
    }

    .reply-message-btn:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .edit-message-btn {
      border: none;
      background: rgba(0, 212, 255, 0.18);
      color: #d6f8ff;
      border: 1px solid rgba(0, 212, 255, 0.28);
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      margin-right: 6px;
    }

    .edit-message-btn:hover {
      background: rgba(0, 212, 255, 0.32);
    }

    .delete-message-btn {
      border: none;
      background: rgba(255, 80, 120, 0.18);
      color: #ffd6e1;
      border: 1px solid rgba(255, 120, 160, 0.25);
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
    }

    .delete-message-btn:hover {
      background: rgba(255, 80, 120, 0.32);
    }

    .reaction-wrapper {
      position: relative;
      display: inline-flex;
      margin-right: 6px;
      padding-top: 30px;
      margin-top: -30px;
    }

    .reaction-open-btn {
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: white;
      font-size: 15px;
      padding: 0;
    }

    .reaction-open-btn:hover {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 0.22);
    }

    .reaction-panel {
      display: inline-flex;
      position: absolute;
      bottom: 32px;
      left: 0;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(30, 31, 50, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.35);
      z-index: 100;
      backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      transform: translateY(4px) scale(0.98);
      transition: opacity 0.12s ease, transform 0.12s ease;
    }

    .reaction-wrapper:hover .reaction-panel,
    .reaction-panel:hover {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .message-row.mine .reaction-panel {
      left: auto;
      right: 0;
    }

    .reaction-btn {
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      cursor: pointer;
      font-size: 19px;
      transition: 0.18s;
      padding: 0;
    }

    .reaction-btn:hover {
      transform: scale(1.12);
      background: rgba(255, 255, 255, 0.22);
    }

    .edited-label {
      font-size: 11px;
      color: #b7c3e8;
      margin-top: 4px;
      opacity: 0.8;
    }

    .typing-bottom {
      margin: 0;
      padding: 0 24px 8px;
      color: #ffd6f1;
      font-style: italic;
      min-height: 20px;
      font-size: 14px;
    }

    .status {
      padding: 0 24px 14px;
      color: #ffd6e8;
      font-size: 14px;
      min-height: 22px;
    }

    .reply-box {
      display: none;
      margin: 0 18px 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(0, 212, 255, 0.12);
      border: 1px solid rgba(0, 212, 255, 0.22);
      color: white;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .reply-box.show {
      display: flex;
    }

    .reply-box-text {
      font-size: 14px;
      line-height: 1.4;
      color: #dff8ff;
      overflow-wrap: anywhere;
    }

    .reply-box button {
      border: none;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .chat-input-wrap {
      position: relative;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
    }

    .chat-input {
      padding: 18px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input textarea {
      flex: 1;
      min-width: 0;
      height: 54px;
      min-height: 54px;
      max-height: 140px;
      padding: 14px 16px;
      border-radius: 18px;
      font-size: 16px;
      line-height: 24px;
      resize: none;
      overflow-y: hidden;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .chat-input textarea {
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.14) transparent;
}

.chat-input textarea::-webkit-scrollbar {
  width: 5px;
}

.chat-input textarea::-webkit-scrollbar-track {
  background: transparent;
}

.chat-input textarea::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.12);
  border-radius: 999px;
}

.chat-input textarea::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.25);
}

    .chat-input textarea::placeholder,
    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .chat-input button {
      border: none;
      padding: 0 24px;
      border-radius: 18px;
      background: linear-gradient(135deg, #7c3cff, #00d4ff);
      color: white;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 14px 35px rgba(0, 212, 255, 0.22);
    }

    .send-btn {
      height: 54px;
    }

    .emoji-toggle-btn {
      width: 46px;
      height: 46px;
      padding: 0 !important;
      border-radius: 15px !important;
      border: 1px solid rgba(255, 255, 255, 0.14) !important;
      background: rgba(255, 255, 255, 0.10) !important;
      color: white !important;
      font-size: 21px !important;
      cursor: pointer;
      box-shadow: none !important;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      transition: 0.2s;
    }

    .emoji-toggle-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.18) !important;
    }

    .emoji-toggle-btn.active {
      background: rgba(124, 60, 255, 0.30) !important;
      border-color: rgba(0, 212, 255, 0.35) !important;
    }

    .emoji-picker {
      display: none;
      position: absolute;
      right: 118px;
      bottom: 82px;
      padding: 11px;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 330px;
      border-radius: 18px;
      background: rgba(30, 31, 50, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      z-index: 50;
      backdrop-filter: blur(18px);
    }

    .emoji-picker.show {
      display: flex;
    }

    .emoji-btn {
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      cursor: pointer;
      font-size: 20px;
      transition: 0.2s;
      padding: 0;
      box-shadow: none;
    }

    .emoji-btn:hover {
      transform: translateY(-2px) scale(1.05);
      background: rgba(255, 255, 255, 0.2);
    }

    .search-highlight .bubble {
      outline: 2px solid rgba(0, 212, 255, 0.65);
      box-shadow: 0 0 22px rgba(0, 212, 255, 0.25);
    }

    .message-row.jump-highlight .bubble {
      animation: jumpFlash 1.2s ease;
      outline: 2px solid rgba(0, 212, 255, 0.8);
      box-shadow: 0 0 28px rgba(0, 212, 255, 0.45);
    }

    @keyframes jumpFlash {
      0% { transform: scale(1); }
      35% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @media (max-width: 700px) {
      body {
        padding: 0;
      }

      .chat-page {
        height: 100vh;
        border-radius: 0;
      }

      .chat-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .name-box {
        flex-direction: column;
        align-items: stretch;
      }

      .messages {
        padding: 18px 14px;
      }

      .message-row {
        max-width: 88%;
      }

      .avatar {
        width: 34px;
        height: 34px;
      }

      .bubble {
        min-width: 58px;
        padding: 13px 16px;
      }

      .chat-input {
        gap: 8px;
        padding: 14px;
      }

      .chat-input textarea {
        height: 44px;
        min-height: 44px;
        padding: 10px 14px;
        line-height: 22px;
      }

      .chat-input button {
        padding: 14px;
      }

      .emoji-toggle-btn {
        width: 44px;
        height: 44px;
        font-size: 20px !important;
      }

      .send-btn {
        height: 44px;
      }

      .emoji-picker {
        right: 86px;
        bottom: 76px;
        max-width: 260px;
      }
    }
  </style>
</head>

<body>
  <div class="chat-page">
    <div class="chat-header">
      <div>
        <h1>Phòng chat 💬</h1>
      </div>

      <div class="header-actions">
        <button type="button" id="searchToggleBtn" class="search-toggle-btn">🔍︎</button>
        <a href="/welcome.html" class="back-btn">Trang chủ</a>
      </div>
    </div>

    <div class="name-box">
      <label for="usernameInput">Tên của bạn:</label>
      <input id="usernameInput" placeholder="Tên sẽ tự lấy từ tài khoản đăng nhập" readonly />
    </div>

    <div class="search-box">
      <input id="searchInput" placeholder="Tìm tin nhắn..." />
      <button type="button" onclick="clearSearch()">Xóa</button>
    </div>

    <div class="messages" id="messages"></div>

    <p id="typingText" class="typing-bottom"></p>
    <div class="status" id="statusText"></div>

    <div class="reply-box" id="replyBox">
      <div class="reply-box-text" id="replyBoxText"></div>
      <button type="button" onclick="cancelReply()">×</button>
    </div>

    <div class="chat-input-wrap">
      <div id="emojiPicker" class="emoji-picker">
        <button class="emoji-btn" onclick="addEmoji('💕')">💕</button>
        <button class="emoji-btn" onclick="addEmoji('😂')">😂</button>
        <button class="emoji-btn" onclick="addEmoji('🥰')">🥰</button>
        <button class="emoji-btn" onclick="addEmoji('😴')">😴</button>
        <button class="emoji-btn" onclick="addEmoji('😭')">😭</button>
        <button class="emoji-btn" onclick="addEmoji('👍')">👍</button>
        <button class="emoji-btn" onclick="addEmoji('🌙')">🌙</button>
        <button class="emoji-btn" onclick="addEmoji('✨')">✨</button>
        <button class="emoji-btn" onclick="addEmoji('😡')">😡</button>
        <button class="emoji-btn" onclick="addEmoji('👏🏼')">👏🏼</button>
        <button class="emoji-btn" onclick="addEmoji('😈')">😈</button>
        <button class="emoji-btn" onclick="addEmoji('🎂')">🎂</button>
        <button class="emoji-btn" onclick="addEmoji('🤭')">🤭</button>
      </div>

      <div class="chat-input">
        <textarea id="messageInput" placeholder="Nhập tin nhắn..." rows="1"></textarea>
        <button type="button" id="emojiToggleBtn" class="emoji-toggle-btn">😊</button>
        <button type="button" class="send-btn" onclick="sendMessage()">Gửi</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>

  <script>
    const socket = io();

    const usernameInput = document.getElementById("usernameInput");
    const messageInput = document.getElementById("messageInput");
    const messagesBox = document.getElementById("messages");
    const statusText = document.getElementById("statusText");
    const typingText = document.getElementById("typingText");
    const replyBox = document.getElementById("replyBox");
    const replyBoxText = document.getElementById("replyBoxText");
    const emojiToggleBtn = document.getElementById("emojiToggleBtn");
    const emojiPicker = document.getElementById("emojiPicker");
    const searchInput = document.getElementById("searchInput");
    const searchToggleBtn = document.getElementById("searchToggleBtn");
    const searchBox = document.querySelector(".search-box");

    let allMessages = [];
    let typingTimer = null;
    let replyingTo = null;

    const savedUser = localStorage.getItem("currentUser");

    if (!savedUser) {
      alert("Bạn cần đăng nhập trước khi vào phòng chat.");
      window.location.href = "/";
    } else {
      try {
        const user = JSON.parse(savedUser);

        if (user.name) {
          usernameInput.value = user.name;
        } else if (user.email) {
          usernameInput.value = user.email;
        } else {
          alert("Không lấy được tên người dùng. Hãy đăng nhập lại.");
          window.location.href = "/";
        }
      } catch (error) {
        alert("Phiên đăng nhập bị lỗi. Hãy đăng nhập lại.");
        window.location.href = "/";
      }
    }

    function formatTime(dateText) {
      const date = new Date(dateText);

      if (isNaN(date.getTime())) {
        return "";
      }

      const h = date.getHours().toString().padStart(2, "0");
      const m = date.getMinutes().toString().padStart(2, "0");

      return h + ":" + m;
    }

    function getDateKey(dateText) {
      const date = new Date(dateText);

      if (isNaN(date.getTime())) {
        return "";
      }

      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");

      return y + "-" + m + "-" + d;
    }

    function formatDateSeparator(dateText) {
      const date = new Date(dateText);

      if (isNaN(date.getTime())) {
        return "";
      }

      const today = new Date();
      const yesterday = new Date();
      yesterday.setDate(today.getDate() - 1);

      const dateKey = getDateKey(date);
      const todayKey = getDateKey(today);
      const yesterdayKey = getDateKey(yesterday);

      if (dateKey === todayKey) {
        return "Hôm nay";
      }

      if (dateKey === yesterdayKey) {
        return "Hôm qua";
      }

      const d = String(date.getDate()).padStart(2, "0");
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const y = date.getFullYear();

      return d + "/" + m + "/" + y;
    }

    function escapeHTML(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getAvatarLetter(name) {
      if (!name || name.trim() === "") {
        return "?";
      }

      return name.trim().charAt(0).toUpperCase();
    }

    function autoResizeMessageInput() {
      const computedStyle = getComputedStyle(messageInput);
      const minHeight = parseInt(computedStyle.minHeight, 10) || 54;
      const maxHeight = 140;

      messageInput.style.height = minHeight + "px";
      messageInput.style.overflowY = "hidden";

      const newHeight = Math.min(messageInput.scrollHeight, maxHeight);
      messageInput.style.height = Math.max(newHeight, minHeight) + "px";

      if (messageInput.scrollHeight > maxHeight) {
        messageInput.style.overflowY = "auto";
      }
    }

    function addMessage(item) {
      const myName = usernameInput.value.trim();
      const isMine = myName && item.username === myName;

      const row = document.createElement("div");
      row.className = "message-row " + (isMine ? "mine" : "other");
      row.dataset.messageId = item.id;

      if (item.reactions && item.reactions.length > 0) {
        row.classList.add("has-reactions");
      }

      const line = document.createElement("div");
      line.className = "message-line";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = getAvatarLetter(item.username);

      const content = document.createElement("div");
      content.className = "message-content";

      const meta = document.createElement("div");
      meta.className = "message-meta";
      meta.textContent = item.username + " • " + formatTime(item.created_at);
      content.appendChild(meta);

      if (item.reply_to_message) {
        const replyPreview = document.createElement("div");
        replyPreview.className = "reply-preview";
        replyPreview.title = "Bấm để tới tin nhắn gốc";

        replyPreview.innerHTML =
          "<strong>" +
          escapeHTML(item.reply_to_username || "Người dùng") +
          "</strong><br>" +
          escapeHTML(item.reply_to_message);

        replyPreview.onclick = function () {
          jumpToMessage(item.reply_to_id);
        };

        content.appendChild(replyPreview);
      }

      const bubbleWrap = document.createElement("div");
      bubbleWrap.className = "bubble-wrap";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = escapeHTML(item.message);

      const reactionsBox = document.createElement("div");
      reactionsBox.className = "message-reactions";
      reactionsBox.dataset.reactionsFor = item.id;
      renderReactionBox(reactionsBox, item.reactions || [], item.id);

      bubbleWrap.appendChild(bubble);
      bubbleWrap.appendChild(reactionsBox);
      content.appendChild(bubbleWrap);

      const tools = document.createElement("div");
      tools.className = "message-tools";

      const reactionWrapper = document.createElement("div");
      reactionWrapper.className = "reaction-wrapper";

      const reactionOpenBtn = document.createElement("button");
      reactionOpenBtn.className = "reaction-open-btn";
      reactionOpenBtn.type = "button";
      reactionOpenBtn.textContent = "😊";
      reactionOpenBtn.title = "Reaction";

      const reactionPanel = document.createElement("div");
      reactionPanel.className = "reaction-panel";

      ["❤️", "😂", "😢", "😯", "😡"].forEach(function (emoji) {
        const reactionBtn = document.createElement("button");
        reactionBtn.className = "reaction-btn";
        reactionBtn.type = "button";
        reactionBtn.textContent = emoji;
        reactionBtn.onclick = function (event) {
          event.stopPropagation();
          reactToMessage(item.id, emoji);
        };

        reactionPanel.appendChild(reactionBtn);
      });

      reactionWrapper.appendChild(reactionOpenBtn);
      reactionWrapper.appendChild(reactionPanel);
      tools.appendChild(reactionWrapper);

      const replyBtn = document.createElement("button");
      replyBtn.className = "reply-message-btn";
      replyBtn.type = "button";
      replyBtn.textContent = "↪";
      replyBtn.onclick = function () {
        startReply(item);
      };
      tools.appendChild(replyBtn);

      if (isMine) {
        const editBtn = document.createElement("button");
        editBtn.className = "edit-message-btn";
        editBtn.type = "button";
        editBtn.textContent = "✏️";
        editBtn.onclick = function () {
          editMessage(item.id, item.message);
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-message-btn";
        deleteBtn.type = "button";
        deleteBtn.textContent = "🗑️";
        deleteBtn.onclick = function () {
          deleteMessage(item.id);
        };

        tools.appendChild(editBtn);
        tools.appendChild(deleteBtn);
      }

      content.appendChild(tools);
      line.appendChild(avatar);
      line.appendChild(content);
      row.appendChild(line);
      messagesBox.appendChild(row);
    }

    async function loadMessages() {
      try {
        const response = await fetch("/api/messages");
        const data = await response.json();

        if (!data.success) {
          statusText.textContent = data.message || "Không lấy được tin nhắn.";
          return;
        }

        allMessages = data.messages;
        renderMessages(allMessages);
        statusText.textContent = "";
      } catch (error) {
        statusText.textContent = "Không kết nối được server chat.";
      }
    }

    function renderMessages(messages) {
      messagesBox.innerHTML = "";

      if (!messages || messages.length === 0) {
        return;
      }

      let lastDateKey = "";

      messages.forEach(function (item) {
        const currentDateKey = getDateKey(item.created_at);

        if (currentDateKey !== lastDateKey) {
          const separator = document.createElement("div");
          separator.className = "date-separator";
          separator.textContent = formatDateSeparator(item.created_at);
          messagesBox.appendChild(separator);
          lastDateKey = currentDateKey;
        }

        addMessage(item);
      });

      messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    function renderReactionBox(reactionsBox, reactions, messageId) {
      reactionsBox.innerHTML = "";

      if (!reactions || reactions.length === 0) {
        return;
      }

      reactions.forEach(function (reaction) {
        const item = document.createElement("button");
        item.className = "reaction-count";
        item.type = "button";
        item.textContent = reaction.emoji + " " + reaction.count;

        item.onclick = function (event) {
          event.stopPropagation();
          reactToMessage(messageId, reaction.emoji);
        };

        reactionsBox.appendChild(item);
      });
    }

    function normalizeSearchText(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d");
    }

    function applySearch() {
      const keyword = normalizeSearchText(searchInput.value.trim());

      if (!keyword) {
        renderMessages(allMessages);
        statusText.textContent = "";
        return;
      }

      const filteredMessages = allMessages.filter(function (item) {
        const username = normalizeSearchText(item.username);
        const message = normalizeSearchText(item.message);
        const replyUsername = normalizeSearchText(item.reply_to_username);
        const replyMessage = normalizeSearchText(item.reply_to_message);

        return (
          username.includes(keyword) ||
          message.includes(keyword) ||
          replyUsername.includes(keyword) ||
          replyMessage.includes(keyword)
        );
      });

      renderMessages(filteredMessages);

      document.querySelectorAll(".message-row").forEach(function (row) {
        row.classList.add("search-highlight");
      });

      if (filteredMessages.length === 0) {
        statusText.textContent = "Không tìm thấy tin nhắn phù hợp.";
      } else {
        statusText.textContent = "Tìm thấy " + filteredMessages.length + " tin nhắn.";
      }
    }

    function clearSearch() {
      searchInput.value = "";
      statusText.textContent = "";
      renderMessages(allMessages);
    }

    function startReply(item) {
      replyingTo = {
        id: item.id,
        username: item.username,
        message: item.message
      };

      replyBoxText.innerHTML =
        "Đang trả lời <strong>" +
        escapeHTML(item.username) +
        "</strong>: " +
        escapeHTML(item.message);

      replyBox.classList.add("show");
      messageInput.focus();
    }

    function cancelReply() {
      replyingTo = null;
      replyBox.classList.remove("show");
      replyBoxText.textContent = "";
    }

    function addEmoji(emoji) {
      messageInput.value += emoji;
      autoResizeMessageInput();
      messageInput.focus();
    }

    emojiToggleBtn.addEventListener("click", function (event) {
      event.stopPropagation();
      emojiPicker.classList.toggle("show");
      emojiToggleBtn.classList.toggle("active");
    });

    emojiPicker.addEventListener("click", function (event) {
      event.stopPropagation();
    });

    document.addEventListener("click", function () {
      emojiPicker.classList.remove("show");
      emojiToggleBtn.classList.remove("active");
    });

    function sendMessage() {
      const username = usernameInput.value.trim();
      const message = messageInput.value.trim();

      if (!username) {
        statusText.textContent = "Bạn cần nhập tên trước.";
        return;
      }

      if (!message) {
        statusText.textContent = "Bạn chưa nhập tin nhắn.";
        return;
      }

      localStorage.setItem("chat_username", username);

      socket.emit("send_message", {
        username: username,
        message: message,
        replyToId: replyingTo ? replyingTo.id : null,
        replyToUsername: replyingTo ? replyingTo.username : null,
        replyToMessage: replyingTo ? replyingTo.message : null
      });

      socket.emit("stop_typing");
      cancelReply();

      messageInput.value = "";
      autoResizeMessageInput();
      statusText.textContent = "";
    }

    async function reactToMessage(messageId, emoji) {
      const username = usernameInput.value.trim();

      if (!username) {
        statusText.textContent = "Bạn cần đăng nhập trước.";
        return;
      }

      try {
        const response = await fetch("/api/messages/" + messageId + "/reactions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: username,
            emoji: emoji
          })
        });

        const data = await response.json();

        if (!data.success) {
          statusText.textContent = data.message || "Không reaction được.";
        }
      } catch (error) {
        statusText.textContent = "Không gửi được reaction.";
      }
    }

    async function editMessage(messageId, oldMessage) {
      const newMessage = prompt("Nhập nội dung mới:", oldMessage);

      if (newMessage === null) {
        return;
      }

      const trimmedMessage = newMessage.trim();

      if (!trimmedMessage) {
        statusText.textContent = "Tin nhắn không được để trống.";
        return;
      }

      if (trimmedMessage.length > 5000) {
        statusText.textContent = "Tin nhắn quá dài.";
        return;
      }

      try {
        const response = await fetch("/api/messages/" + messageId, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: usernameInput.value.trim(),
            message: trimmedMessage
          })
        });

        const data = await response.json();

        if (!data.success) {
          statusText.textContent = data.message || "Sửa tin nhắn thất bại.";
          return;
        }

        updateMessageOnScreen(data.updatedMessage);
      } catch (error) {
        statusText.textContent = "Không sửa được tin nhắn.";
      }
    }

    function updateMessageOnScreen(item) {
      const messageElement = document.querySelector('[data-message-id="' + item.id + '"]');

      if (!messageElement) {
        return;
      }

      const bubble = messageElement.querySelector(".bubble");

      if (bubble) {
        bubble.innerHTML = escapeHTML(item.message);
      }

      let editedLabel = messageElement.querySelector(".edited-label");

      if (!editedLabel) {
        editedLabel = document.createElement("div");
        editedLabel.className = "edited-label";
        editedLabel.textContent = "Đã chỉnh sửa";

        const messageContent = messageElement.querySelector(".message-content");

        if (messageContent) {
          messageContent.appendChild(editedLabel);
        }
      }
    }

    async function deleteMessage(messageId) {
      const confirmDelete = confirm("Bạn có chắc muốn xóa tin nhắn này không?");

      if (!confirmDelete) {
        return;
      }

      try {
        const response = await fetch("/api/messages/" + messageId, {
          method: "DELETE"
        });

        const data = await response.json();

        if (!data.success) {
          statusText.textContent = data.message || "Xóa tin nhắn thất bại.";
          return;
        }

        const messageElement = document.querySelector('[data-message-id="' + messageId + '"]');

        if (messageElement) {
          messageElement.remove();
        }
      } catch (error) {
        statusText.textContent = "Không xóa được tin nhắn.";
      }
    }

    function jumpToMessage(messageId) {
      if (!messageId) {
        return;
      }

      const target = document.querySelector('[data-message-id="' + messageId + '"]');

      if (!target) {
        statusText.textContent = "Tin nhắn gốc không còn trong danh sách hiện tại.";

        setTimeout(function () {
          statusText.textContent = "";
        }, 2500);

        return;
      }

      target.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });

      target.classList.add("jump-highlight");

      setTimeout(function () {
        target.classList.remove("jump-highlight");
      }, 1300);
    }

    socket.on("receive_message", function (message) {
      message.reactions = message.reactions || [];
      allMessages.push(message);

      if (searchInput.value.trim()) {
        applySearch();
      } else {
        renderMessages(allMessages);
      }
    });

    socket.on("user_typing", function (username) {
      if (username && username !== usernameInput.value.trim()) {
        typingText.textContent = username + " đang nhập...";
      }
    });

    socket.on("user_stop_typing", function () {
      typingText.textContent = "";
    });

    socket.on("delete_message", function (messageId) {
      allMessages = allMessages.filter(function (item) {
        return Number(item.id) !== Number(messageId);
      });

      if (searchInput.value.trim()) {
        applySearch();
      } else {
        renderMessages(allMessages);
      }
    });

    socket.on("edit_message", function (updatedMessage) {
      allMessages = allMessages.map(function (item) {
        if (Number(item.id) === Number(updatedMessage.id)) {
          return {
            ...item,
            ...updatedMessage,
            reactions: item.reactions || []
          };
        }

        return item;
      });

      if (searchInput.value.trim()) {
        applySearch();
      } else {
        renderMessages(allMessages);
      }
    });

    socket.on("update_message_reactions", function (data) {
      allMessages = allMessages.map(function (item) {
        if (Number(item.id) === Number(data.messageId)) {
          return {
            ...item,
            reactions: data.reactions
          };
        }

        return item;
      });

      const reactionsBox = document.querySelector('[data-reactions-for="' + data.messageId + '"]');

      if (reactionsBox) {
        renderReactionBox(reactionsBox, data.reactions, data.messageId);
      }

      const messageRow = document.querySelector('[data-message-id="' + data.messageId + '"]');

      if (messageRow) {
        if (data.reactions && data.reactions.length > 0) {
          messageRow.classList.add("has-reactions");
        } else {
          messageRow.classList.remove("has-reactions");
        }
      }
    });

    messageInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
        return;
      }

      socket.emit("typing", usernameInput.value.trim());

      clearTimeout(typingTimer);

      typingTimer = setTimeout(function () {
        socket.emit("stop_typing");
      }, 1000);
    });

    messageInput.addEventListener("input", function () {
      autoResizeMessageInput();
    });

    searchInput.addEventListener("input", applySearch);

    searchToggleBtn.addEventListener("click", function () {
      searchBox.classList.toggle("show");
      searchToggleBtn.classList.toggle("active");

      if (searchBox.classList.contains("show")) {
        searchInput.focus();
      } else {
        clearSearch();
      }
    });

    loadMessages();
    autoResizeMessageInput();
  </script>
</body>
</html>
