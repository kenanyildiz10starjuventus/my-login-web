<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Phòng chat</title>

  <style>

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg-1: #0f1020;
    --bg-2: #18192f;
    --glass: rgba(255, 255, 255, 0.08);
    --glass-2: rgba(255, 255, 255, 0.12);
    --border: rgba(255, 255, 255, 0.12);
    --text: #ffffff;
    --text-soft: rgba(255, 255, 255, 0.72);
    --pink-1: #ff6fa5;
    --pink-2: #ff8fbc;
    --pink-3: #ffc2d8;
    --blue-1: #7dd3fc;
    --blue-2: #a78bfa;
    --danger: #ff5f8f;
    --shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
  }

  body {
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(255, 140, 180, 0.25), transparent 28%),
      radial-gradient(circle at top right, rgba(125, 211, 252, 0.16), transparent 24%),
      radial-gradient(circle at bottom center, rgba(167, 139, 250, 0.16), transparent 26%),
      linear-gradient(135deg, #0d0e1a, #16172a, #111222);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .chat-container {
    width: 100%;
    max-width: 980px;
    height: 88vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-radius: 28px;
    background:
      radial-gradient(circle at top left, rgba(255, 182, 193, 0.15), transparent 30%),
      radial-gradient(circle at bottom right, rgba(255, 105, 180, 0.10), transparent 28%),
      rgba(20, 21, 38, 0.88);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
  }

  .chat-header {
    padding: 22px 24px 18px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  }

  .chat-header h1 {
    font-size: 28px;
    margin-bottom: 6px;
    font-weight: 800;
    letter-spacing: 0.3px;
  }

  .chat-header p {
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.5;
  }

  #typingText {
    margin-top: 6px;
    color: #ffd6ea;
    font-style: italic;
    min-height: 18px;
    font-size: 13px;
  }

  .search-box {
    padding: 14px 18px;
    display: flex;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.04);
  }

  .search-box input {
    flex: 1;
    padding: 13px 15px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
    font-size: 14px;
    transition: 0.2s;
  }

  .search-box input::placeholder {
    color: rgba(255,255,255,0.45);
  }

  .search-box input:focus {
    border-color: rgba(255, 182, 193, 0.55);
    box-shadow: 0 0 0 3px rgba(255, 182, 193, 0.12);
  }

  .search-box button {
    border: none;
    padding: 0 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.12);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  .search-box button:hover {
    background: rgba(255,255,255,0.20);
  }

  .messages {
    flex: 1;
    padding: 22px 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background:
      radial-gradient(circle at top left, rgba(255, 182, 193, 0.12), transparent 28%),
      radial-gradient(circle at top right, rgba(255, 220, 230, 0.10), transparent 26%),
      linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar {
    width: 8px;
  }

  .messages::-webkit-scrollbar-track {
    background: transparent;
  }

  .messages::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.16);
    border-radius: 999px;
  }

  .date-separator {
    align-self: center;
    margin: 12px 0;
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.10);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: #e9eeff;
    font-size: 13px;
    font-weight: bold;
    backdrop-filter: blur(8px);
  }

  .message-row {
    display: flex;
    flex-direction: column;
    max-width: 78%;
    animation: fadeInUp 0.28s ease;
  }

  .message-row.mine {
    align-self: flex-end;
  }

  .message-row.other {
    align-self: flex-start;
  }

  .message-line {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .message-row.mine .message-line {
    flex-direction: row-reverse;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    font-weight: 800;
    font-size: 15px;
    color: white;
    box-shadow: 0 8px 22px rgba(255, 140, 180, 0.22);
  }

  .message-row.mine .avatar {
    background: linear-gradient(135deg, var(--pink-1), var(--pink-2));
  }

  .message-row.other .avatar {
    background: linear-gradient(135deg, var(--blue-2), var(--blue-1));
  }

  .message-content {
    display: flex;
    flex-direction: column;
    max-width: 100%;
  }

  .message-row.mine .message-content {
    align-items: flex-end;
  }

  .message-meta {
    font-size: 12px;
    margin-bottom: 6px;
    color: rgba(255, 255, 255, 0.65);
    padding: 0 6px;
  }

  .reply-preview {
    margin-bottom: 8px;
    padding: 10px 12px;
    border-left: 3px solid #ffd6e7;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    color: #fff7fb;
    font-size: 13px;
    line-height: 1.45;
    cursor: pointer;
    backdrop-filter: blur(8px);
  }

  .reply-preview:hover {
    background: rgba(255, 255, 255, 0.16);
  }

  .reply-preview strong {
    color: #ffe3ef;
  }

  .bubble {
    position: relative;
    padding: 13px 16px;
    border-radius: 22px;
    line-height: 1.5;
    font-size: 15px;
    word-wrap: break-word;
    white-space: pre-wrap;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.14);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .bubble:hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.18);
  }

  .message-row.mine .bubble {
    color: white;
    background: linear-gradient(135deg, #ff6fa5, #ff85b3, #ff9fc4);
    border-bottom-right-radius: 8px;
  }

  .message-row.other .bubble {
    color: #fff;
    background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.10));
    border: 1px solid rgba(255,255,255,0.12);
    border-bottom-left-radius: 8px;
  }

  .message-row.mine .bubble::after {
    content: "";
    position: absolute;
    right: -6px;
    bottom: 0;
    width: 16px;
    height: 16px;
    background: #ff9fc4;
    border-bottom-left-radius: 14px;
    clip-path: polygon(0 0, 100% 100%, 0 100%);
  }

  .message-row.other .bubble::after {
    content: "";
    position: absolute;
    left: -6px;
    bottom: 0;
    width: 16px;
    height: 16px;
    background: rgba(255,255,255,0.14);
    border-bottom-right-radius: 14px;
    clip-path: polygon(100% 0, 100% 100%, 0 100%);
  }

  .message-tools {
    margin-top: 7px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .message-row.mine .message-tools {
    justify-content: flex-end;
  }

  .reply-message-btn,
  .edit-message-btn,
  .delete-message-btn {
    border: none;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
    color: white;
    backdrop-filter: blur(8px);
  }

  .reply-message-btn {
    background: rgba(255, 255, 255, 0.14);
    border: 1px solid rgba(255,255,255,0.14);
  }

  .reply-message-btn:hover {
    background: rgba(255, 255, 255, 0.22);
  }

  .edit-message-btn {
    background: rgba(255, 182, 193, 0.22);
    border: 1px solid rgba(255, 192, 203, 0.22);
  }

  .edit-message-btn:hover {
    background: rgba(255, 182, 193, 0.34);
  }

  .delete-message-btn {
    background: rgba(255, 95, 143, 0.18);
    border: 1px solid rgba(255, 95, 143, 0.24);
  }

  .delete-message-btn:hover {
    background: rgba(255, 95, 143, 0.30);
  }

  .edited-label {
    font-size: 11px;
    color: rgba(255,255,255,0.68);
    margin-top: 5px;
    padding: 0 6px;
  }

  .status {
    min-height: 22px;
    padding: 8px 18px 0;
    font-size: 13px;
    color: #ffe2ee;
  }

  .reply-box {
    display: none;
    margin: 0 18px 10px;
    padding: 12px 14px;
    border-radius: 16px;
    background: rgba(255, 182, 193, 0.12);
    border: 1px solid rgba(255, 182, 193, 0.20);
    color: white;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    backdrop-filter: blur(8px);
  }

  .reply-box.show {
    display: flex;
  }

  .reply-box-text {
    font-size: 14px;
    line-height: 1.4;
    color: #fff1f7;
  }

  .reply-box-text strong {
    color: #ffd7e8;
  }

  .reply-box button {
    border: none;
    background: rgba(255,255,255,0.12);
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
  }

  .reply-box button:hover {
    background: rgba(255,255,255,0.20);
  }

  .emoji-bar {
    display: flex;
    gap: 8px;
    padding: 0 18px 12px;
    flex-wrap: wrap;
  }

  .emoji-btn {
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.14);
    cursor: pointer;
    font-size: 20px;
    transition: 0.2s;
  }

  .emoji-btn:hover {
    transform: translateY(-2px) scale(1.05);
    background: rgba(255, 255, 255, 0.20);
  }

  .chat-input {
    padding: 14px 18px 18px;
    display: flex;
    gap: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.05));
  }

  .chat-input input {
    flex: 1;
    padding: 14px 16px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
    font-size: 15px;
    transition: 0.2s;
  }

  .chat-input input::placeholder {
    color: rgba(255,255,255,0.45);
  }

  .chat-input input:focus {
    border-color: rgba(255, 182, 193, 0.55);
    box-shadow: 0 0 0 3px rgba(255, 182, 193, 0.12);
  }

  .chat-input button {
    border: none;
    padding: 0 20px;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--pink-1), var(--pink-2));
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
    box-shadow: 0 10px 24px rgba(255, 111, 165, 0.28);
  }

  .chat-input button:hover {
    transform: translateY(-1px);
    filter: brightness(1.06);
  }

  .search-highlight .bubble {
    outline: 2px solid rgba(255, 214, 234, 0.78);
    box-shadow: 0 0 20px rgba(255, 182, 193, 0.28);
  }

  .message-row.jump-highlight .bubble {
    animation: jumpFlash 1.2s ease;
    outline: 2px solid rgba(255, 214, 234, 0.9);
    box-shadow: 0 0 28px rgba(255, 182, 193, 0.42);
  }

  @keyframes jumpFlash {
    0% {
      transform: scale(1);
    }

    35% {
      transform: scale(1.04);
    }

    100% {
      transform: scale(1);
    }
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 768px) {
    body {
      padding: 10px;
    }

    .chat-container {
      height: 94vh;
      border-radius: 20px;
    }

    .chat-header h1 {
      font-size: 23px;
    }

    .message-row {
      max-width: 92%;
    }

    .avatar {
      width: 34px;
      height: 34px;
      font-size: 14px;
    }

    .bubble {
      font-size: 14px;
      padding: 12px 14px;
    }

    .chat-input {
      flex-direction: column;
    }

    .chat-input button {
      height: 46px;
    }

    .search-box {
      flex-direction: column;
    }

    .search-box button {
      height: 44px;
    }
  }
</style>
</head>

<body>
  <div class="chat-page">
    <div class="chat-header">
      <div>
        <h1>Phòng chat 💬</h1>
        <p>Chat realtime giữa các người dùng, tin nhắn hiện ngay lập tức.</p>
<p id="typingText"></p>
      </div>

      <a href="/welcome.html" class="back-btn">Trang chủ</a>
    </div>

    <div class="name-box">
      <label for="usernameInput">Tên của bạn:</label>
     <input id="usernameInput" placeholder="Tên sẽ tự lấy từ tài khoản đăng nhập" readonly />
    </div>

    <div class="messages" id="messages"></div>

    <div class="status" id="statusText"></div>

    <div class="reply-box" id="replyBox">
  <div class="reply-box-text" id="replyBoxText"></div>
  <button onclick="cancelReply()">×</button>
</div>

 <div class="emoji-bar">
  <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
  <button class="emoji-btn" onclick="addEmoji('😂')">😂</button>
  <button class="emoji-btn" onclick="addEmoji('🥰')">🥰</button>
  <button class="emoji-btn" onclick="addEmoji('😴')">😴</button>
  <button class="emoji-btn" onclick="addEmoji('😭')">😭</button>
  <button class="emoji-btn" onclick="addEmoji('👍')">👍</button>
  <button class="emoji-btn" onclick="addEmoji('🌙')">🌙</button>
  <button class="emoji-btn" onclick="addEmoji('✨')">✨</button>
</div>

    <div class="chat-input">
      <input id="messageInput" placeholder="Nhập tin nhắn..." />
      <button onclick="sendMessage()">Gửi</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>

<script>
  const socket = io();

  const usernameInput = document.getElementById("usernameInput");
  const messageInput = document.getElementById("messageInput");
  const messagesBox = document.getElementById("messages");
  const statusText = document.getElementById("statusText");
  const typingText = document.getElementById("typingText");
let typingTimer = null;
  const replyBox = document.getElementById("replyBox");
const replyBoxText = document.getElementById("replyBoxText");

let replyingTo = null;

 const savedUser = localStorage.getItem("currentUser");

if (!savedUser) {
  alert("Bạn cần đăng nhập trước khi vào phòng chat.");
  window.location.href = "/";
} else {
  try {
    const user = JSON.parse(savedUser);

    if (user.name) {
      usernameInput.value = user.name;
    } else if (user.email) {
      usernameInput.value = user.email;
    } else {
      alert("Không lấy được tên người dùng. Hãy đăng nhập lại.");
      window.location.href = "/";
    }
  } catch (error) {
    alert("Phiên đăng nhập bị lỗi. Hãy đăng nhập lại.");
    window.location.href = "/";
  }
}

  function formatTime(dateText) {
    const date = new Date(dateText);

    if (isNaN(date.getTime())) {
      return "";
    }

    const h = date.getHours().toString().padStart(2, "0");
    const m = date.getMinutes().toString().padStart(2, "0");

    return h + ":" + m;
  }

  function getDateKey(dateText) {
  const date = new Date(dateText);

  if (isNaN(date.getTime())) {
    return "";
  }

  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");

  return y + "-" + m + "-" + d;
}

function formatDateSeparator(dateText) {
  const date = new Date(dateText);

  if (isNaN(date.getTime())) {
    return "";
  }

  const today = new Date();
  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);

  const dateKey = getDateKey(date);
  const todayKey = getDateKey(today);
  const yesterdayKey = getDateKey(yesterday);

  if (dateKey === todayKey) {
    return "Hôm nay";
  }

  if (dateKey === yesterdayKey) {
    return "Hôm qua";
  }

  const d = String(date.getDate()).padStart(2, "0");
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const y = date.getFullYear();

  return d + "/" + m + "/" + y;
}


  function escapeHTML(text) {
    return text
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

 function getAvatarLetter(name) {
  if (!name || name.trim() === "") {
    return "?";
  }

  return name.trim().charAt(0).toUpperCase();
}

function addMessage(item) {
  const myName = usernameInput.value.trim();
  const isMine = myName && item.username === myName;

  const row = document.createElement("div");
  row.className = "message-row " + (isMine ? "mine" : "other");
  row.dataset.messageId = item.id;

  const line = document.createElement("div");
  line.className = "message-line";

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = getAvatarLetter(item.username);

  const content = document.createElement("div");
  content.className = "message-content";

  const meta = document.createElement("div");
  meta.className = "message-meta";
  meta.textContent = item.username + " • " + formatTime(item.created_at);

  content.appendChild(meta);

if (item.reply_to_message) {
  const replyPreview = document.createElement("div");
  replyPreview.className = "reply-preview";
  replyPreview.title = "Bấm để tới tin nhắn gốc";

  replyPreview.innerHTML =
    "<strong>" +
    escapeHTML(item.reply_to_username || "Người dùng") +
    "</strong><br>" +
    escapeHTML(item.reply_to_message);

  replyPreview.onclick = function () {
    jumpToMessage(item.reply_to_id);
  };

  content.appendChild(replyPreview);
}

const bubble = document.createElement("div");
bubble.className = "bubble";
bubble.innerHTML = escapeHTML(item.message);

content.appendChild(bubble);

const tools = document.createElement("div");
tools.className = "message-tools";

const replyBtn = document.createElement("button");
replyBtn.className = "reply-message-btn";
replyBtn.textContent = "Trả lời";
replyBtn.onclick = function () {
  startReply(item);
};

tools.appendChild(replyBtn);

if (isMine) {
  const editBtn = document.createElement("button");
  editBtn.className = "edit-message-btn";
  editBtn.textContent = "Sửa";
  editBtn.onclick = function () {
    editMessage(item.id, item.message);
  };

  const deleteBtn = document.createElement("button");
  deleteBtn.className = "delete-message-btn";
  deleteBtn.textContent = "Xóa";
  deleteBtn.onclick = function () {
    deleteMessage(item.id);
  };

  tools.appendChild(editBtn);
  tools.appendChild(deleteBtn);
}

content.appendChild(tools);
  line.appendChild(avatar);
  line.appendChild(content);
  row.appendChild(line);

  messagesBox.appendChild(row);
  messagesBox.scrollTop = messagesBox.scrollHeight;
}

  async function loadMessages() {
    try {
      const response = await fetch("/api/messages");
      const data = await response.json();

      if (!data.success) {
        statusText.textContent = data.message || "Không lấy được tin nhắn.";
        return;
      }

      messagesBox.innerHTML = "";

let lastDateKey = "";

data.messages.forEach(function (item) {
  const currentDateKey = getDateKey(item.created_at);

  if (currentDateKey !== lastDateKey) {
    const separator = document.createElement("div");
    separator.className = "date-separator";
    separator.textContent = formatDateSeparator(item.created_at);

    messagesBox.appendChild(separator);
    lastDateKey = currentDateKey;
  }

  addMessage(item);
});

      statusText.textContent = "";
    } catch (error) {
      statusText.textContent = "Không kết nối được server chat.";
    }
  }
function startReply(item) {
  replyingTo = {
    id: item.id,
    username: item.username,
    message: item.message
  };

  replyBoxText.innerHTML =
    "Đang trả lời <strong>" +
    escapeHTML(item.username) +
    "</strong>: " +
    escapeHTML(item.message);

  replyBox.classList.add("show");
  messageInput.focus();
}

function cancelReply() {
  replyingTo = null;
  replyBox.classList.remove("show");
  replyBoxText.textContent = "";
}

function addEmoji(emoji) {
  messageInput.value += emoji;
  messageInput.focus();
}

  function sendMessage() {
    const username = usernameInput.value.trim();
    const message = messageInput.value.trim();

    if (!username) {
      statusText.textContent = "Bạn cần nhập tên trước.";
      return;
    }

    if (!message) {
      statusText.textContent = "Bạn chưa nhập tin nhắn.";
      return;
    }

    localStorage.setItem("chat_username", username);

   socket.emit("send_message", {
  username: username,
  message: message,
  replyToId: replyingTo ? replyingTo.id : null,
  replyToUsername: replyingTo ? replyingTo.username : null,
  replyToMessage: replyingTo ? replyingTo.message : null
});

socket.emit("stop_typing");
cancelReply();

    messageInput.value = "";
    statusText.textContent = "";
  }
async function editMessage(messageId, oldMessage) {
  const newMessage = prompt("Nhập nội dung mới:", oldMessage);

  if (newMessage === null) {
    return;
  }

  const trimmedMessage = newMessage.trim();

  if (!trimmedMessage) {
    statusText.textContent = "Tin nhắn không được để trống.";
    return;
  }

  if (trimmedMessage.length > 500) {
    statusText.textContent = "Tin nhắn quá dài.";
    return;
  }

  try {
    const response = await fetch("/api/messages/" + messageId, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username: usernameInput.value.trim(),
        message: trimmedMessage
      })
    });

    const data = await response.json();

    if (!data.success) {
      statusText.textContent = data.message || "Sửa tin nhắn thất bại.";
      return;
    }

    updateMessageOnScreen(data.updatedMessage);
  } catch (error) {
    statusText.textContent = "Không sửa được tin nhắn.";
  }
}

function updateMessageOnScreen(item) {
  const messageElement = document.querySelector('[data-message-id="' + item.id + '"]');

  if (!messageElement) {
    return;
  }

  const bubble = messageElement.querySelector(".bubble");

  if (bubble) {
    bubble.innerHTML = escapeHTML(item.message);
  }

  let editedLabel = messageElement.querySelector(".edited-label");

  if (!editedLabel) {
    editedLabel = document.createElement("div");
    editedLabel.className = "edited-label";
    editedLabel.textContent = "Đã chỉnh sửa";

    const messageContent = messageElement.querySelector(".message-content");

    if (messageContent) {
      messageContent.appendChild(editedLabel);
    }
  }
}

async function deleteMessage(messageId) {
  const confirmDelete = confirm("Bạn có chắc muốn xóa tin nhắn này không?");

  if (!confirmDelete) {
    return;
  }

  try {
    const response = await fetch("/api/messages/" + messageId, {
      method: "DELETE"
    });

    const data = await response.json();

    if (!data.success) {
      statusText.textContent = data.message || "Xóa tin nhắn thất bại.";
      return;
    }

    const messageElement = document.querySelector('[data-message-id="' + messageId + '"]');

    if (messageElement) {
      messageElement.remove();
    }
  } catch (error) {
    statusText.textContent = "Không xóa được tin nhắn.";
  }
}

  socket.on("receive_message", function (message) {
    addMessage(message);
  });
  socket.on("user_typing", function (username) {
  if (username && username !== usernameInput.value.trim()) {
    typingText.textContent = username + " đang nhập...";
  }
});

socket.on("user_stop_typing", function () {
  typingText.textContent = "";
});

 socket.on("delete_message", function (messageId) {
  const messageElement = document.querySelector('[data-message-id="' + messageId + '"]');

  if (messageElement) {
    messageElement.remove();
  }
});

socket.on("edit_message", function (updatedMessage) {
  updateMessageOnScreen(updatedMessage);
});

  messageInput.addEventListener("keydown", function (event) {
  if (event.key === "Enter") {
    sendMessage();
    return;
  }

  socket.emit("typing", usernameInput.value.trim());

  clearTimeout(typingTimer);

  typingTimer = setTimeout(function () {
    socket.emit("stop_typing");
  }, 1000);
});

 

  loadMessages();

  function jumpToMessage(messageId) {
  if (!messageId) {
    return;
  }

  const target = document.querySelector('[data-message-id="' + messageId + '"]');

  if (!target) {
    statusText.textContent = "Tin nhắn gốc không còn trong danh sách hiện tại.";

    setTimeout(function () {
      statusText.textContent = "";
    }, 2500);

    return;
  }

  target.scrollIntoView({
    behavior: "smooth",
    block: "center"
  });

  target.classList.add("jump-highlight");

  setTimeout(function () {
    target.classList.remove("jump-highlight");
  }, 1300);
}
