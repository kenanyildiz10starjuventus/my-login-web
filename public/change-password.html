<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đổi mật khẩu</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-box {
      width: 430px;
      max-width: 90%;
      background: white;
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      color: #222;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #5b5cf0;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #4849d8;
    }

    .show-password {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      margin-bottom: 16px;
    }

    .show-password input {
      width: auto;
      margin: 0;
    }

    .message {
      margin-top: 18px;
      text-align: center;
      font-weight: bold;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }

    .back-link {
      display: block;
      margin-top: 18px;
      text-align: center;
      color: #5b5cf0;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="password-box">
    <h1>Đổi mật khẩu</h1>

    <form id="changePasswordForm">
      <label>Mật khẩu cũ</label>
      <input type="password" id="oldPassword" placeholder="Nhập mật khẩu cũ" />

      <label>Mật khẩu mới</label>
      <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới" />

      <label>Nhập lại mật khẩu mới</label>
      <input type="password" id="confirmNewPassword" placeholder="Nhập lại mật khẩu mới" />

      <label class="show-password">
        <input type="checkbox" id="showPassword" />
        Hiện mật khẩu
      </label>

      <button type="submit">Lưu mật khẩu mới</button>
    </form>

    <p id="message" class="message"></p>

    <a href="/welcome.html" class="back-link">Quay lại Dashboard</a>
  </div>

  <script>
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    const userEmail = localStorage.getItem("userEmail");

    if (isLoggedIn !== "true") {
      window.location.href = "/";
    }

    const changePasswordForm = document.getElementById("changePasswordForm");
    const message = document.getElementById("message");

    const oldPasswordInput = document.getElementById("oldPassword");
    const newPasswordInput = document.getElementById("newPassword");
    const confirmNewPasswordInput = document.getElementById("confirmNewPassword");
    const showPassword = document.getElementById("showPassword");

    showPassword.addEventListener("change", function () {
      if (showPassword.checked) {
        oldPasswordInput.type = "text";
        newPasswordInput.type = "text";
        confirmNewPasswordInput.type = "text";
      } else {
        oldPasswordInput.type = "password";
        newPasswordInput.type = "password";
        confirmNewPasswordInput.type = "password";
      }
    });

    changePasswordForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const oldPassword = oldPasswordInput.value.trim();
      const newPassword = newPasswordInput.value.trim();
      const confirmNewPassword = confirmNewPasswordInput.value.trim();

      const response = await fetch("/change-password", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: userEmail,
          oldPassword: oldPassword,
          newPassword: newPassword,
          confirmNewPassword: confirmNewPassword
        })
      });

      const data = await response.json();

      if (data.success) {
        message.textContent = "Đổi mật khẩu thành công, đang quay lại Dashboard...";
        message.className = "message success";

        setTimeout(function () {
          window.location.href = "/welcome.html";
        }, 1200);
      } else {
        message.textContent = data.message;
        message.className = "message error";
      }
    });
  </script>
</body>
</html>
