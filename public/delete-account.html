<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xóa tài khoản</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .delete-box {
      width: 430px;
      max-width: 90%;
      background: white;
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      text-align: center;
      margin-bottom: 16px;
      color: #222;
    }

    .warning {
      background: #fff1f3;
      color: #c6283d;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.5;
      margin-bottom: 22px;
      font-weight: bold;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #ff5c7a;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #e84866;
    }

    .back-link {
      display: block;
      margin-top: 18px;
      text-align: center;
      color: #5b5cf0;
      font-weight: bold;
      text-decoration: none;
    }

    .message {
      margin-top: 18px;
      text-align: center;
      font-weight: bold;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }

    .show-password {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      margin-bottom: 16px;
    }

    .show-password input {
      width: auto;
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="delete-box">
    <h1>Xóa tài khoản</h1>

    <div class="warning">
      Cảnh báo: Sau khi xóa, tài khoản của bạn sẽ bị xóa khỏi database và không thể đăng nhập lại bằng tài khoản này.
    </div>

    <form id="deleteForm">
      <label>Email tài khoản</label>
      <input type="email" id="email" readonly />

      <label>Nhập mật khẩu để xác nhận</label>
      <input type="password" id="password" placeholder="Nhập mật khẩu hiện tại" />

      <label class="show-password">
        <input type="checkbox" id="showPassword" />
        Hiện mật khẩu
      </label>

      <button type="submit">Xóa tài khoản</button>
    </form>

    <p id="message" class="message"></p>

    <a href="/welcome.html" class="back-link">Quay lại Dashboard</a>
  </div>

  <script>
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    const userEmail = localStorage.getItem("userEmail");

    if (isLoggedIn !== "true") {
      window.location.href = "/";
    }

    const deleteForm = document.getElementById("deleteForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const showPassword = document.getElementById("showPassword");
    const message = document.getElementById("message");

    emailInput.value = userEmail || "";

    showPassword.addEventListener("change", function () {
      if (showPassword.checked) {
        passwordInput.type = "text";
      } else {
        passwordInput.type = "password";
      }
    });

    deleteForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const confirmDelete = confirm("Bạn có chắc chắn muốn xóa tài khoản này không?");

      if (!confirmDelete) {
        return;
      }

      const password = passwordInput.value.trim();

      const response = await fetch("/delete-account", {
        method: "DELETE",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: userEmail,
          password: password
        })
      });

      const data = await response.json();

      if (data.success) {
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("userName");
        localStorage.removeItem("userEmail");

        message.textContent = "Xóa tài khoản thành công, đang quay về trang đăng nhập...";
        message.className = "message success";

        setTimeout(function () {
          window.location.href = "/";
        }, 1200);
      } else {
        message.textContent = data.message;
        message.className = "message error";
      }
    });
  </script>
</body>
</html>
