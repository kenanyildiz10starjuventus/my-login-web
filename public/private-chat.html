<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chat riêng 1v1</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(124, 60, 255, 0.45), transparent 32%),
        radial-gradient(circle at bottom right, rgba(0, 212, 255, 0.28), transparent 34%),
        #070816;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .private-page {
      width: min(1150px, 100%);
      height: min(800px, 94vh);
      border-radius: 30px;
      overflow: hidden;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(22px);
      box-shadow: 0 30px 100px rgba(0,0,0,0.45);
      display: grid;
      grid-template-columns: 310px 1fr;
    }

    .sidebar {
      border-right: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .sidebar-header {
      padding: 22px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .sidebar-header h1 {
      margin: 0 0 6px;
      font-size: 25px;
    }

    .sidebar-header p {
      margin: 0;
      color: #c7d2ff;
      font-size: 14px;
      line-height: 1.5;
    }

    .back-btn {
      display: inline-block;
      margin-top: 14px;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
      padding: 11px 14px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 13px;
    }

    .user-list {
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .user-item {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 13px;
      display: flex;
      gap: 12px;
      align-items: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .user-item:hover,
    .user-item.active {
      background: rgba(255,255,255,0.16);
      transform: translateY(-1px);
    }

    .user-avatar,
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, #7c3cff, #00d4ff);
      box-shadow: 0 8px 24px rgba(0, 212, 255, 0.25);
    }

    .user-info {
      min-width: 0;
    }

    .user-info strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .user-info span {
      display: block;
      color: #c7d2ff;
      font-size: 12px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .chat-page {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .chat-header {
      padding: 22px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .chat-header h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .chat-header p {
      margin: 0;
      color: #c7d2ff;
      font-size: 14px;
    }

    #typingText {
      margin-top: 4px;
      color: #ffd6f1;
      font-style: italic;
      min-height: 18px;
    }

    .name-box {
      padding: 14px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
    }

    .name-box label {
      font-weight: bold;
      color: #dce6ff;
      white-space: nowrap;
    }

    .name-box input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: white;
      outline: none;
      font-size: 15px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .empty-state {
      margin: auto;
      max-width: 360px;
      text-align: center;
      color: #c7d2ff;
      line-height: 1.6;
    }

    .message-row {
      max-width: 75%;
      display: flex;
      flex-direction: column;
    }

    .message-row.mine {
      align-self: flex-end;
      text-align: right;
    }

    .message-row.other {
      align-self: flex-start;
      text-align: left;
    }

    .message-line {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .message-row.mine .message-line {
      flex-direction: row-reverse;
    }

    .message-content {
      display: flex;
      flex-direction: column;
    }

    .message-row.mine .message-content {
      align-items: flex-end;
    }

    .message-meta {
      font-size: 12px;
      color: #b7c3e8;
      margin-bottom: 5px;
      padding: 0 6px;
    }

    .bubble {
      padding: 13px 15px;
      border-radius: 18px;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .mine .bubble {
      background: linear-gradient(135deg, #7c3cff, #00d4ff);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .other .bubble {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.12);
      color: #f5f7ff;
      border-bottom-left-radius: 6px;
    }

    .message-tools {
      margin-top: 5px;
    }

    .reply-message-btn,
    .edit-message-btn,
    .delete-message-btn {
      border: none;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
      margin-right: 6px;
    }

    .reply-message-btn {
      background: rgba(255, 255, 255, 0.12);
      color: #eaf6ff;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .edit-message-btn {
      background: rgba(0, 212, 255, 0.18);
      color: #d6f8ff;
      border: 1px solid rgba(0, 212, 255, 0.28);
    }

    .delete-message-btn {
      background: rgba(255, 80, 120, 0.18);
      color: #ffd6e1;
      border: 1px solid rgba(255, 120, 160, 0.25);
    }

    .reply-preview {
      margin-bottom: 8px;
      padding: 9px 11px;
      border-left: 3px solid #00d4ff;
      background: rgba(0, 212, 255, 0.12);
      border-radius: 12px;
      color: #dff8ff;
      font-size: 13px;
      line-height: 1.4;
      cursor: pointer;
    }

    .reply-preview strong {
      color: #8eeaff;
    }

    .edited-label {
      font-size: 11px;
      color: #b7c3e8;
      margin-top: 4px;
      opacity: 0.8;
    }

    .date-separator {
      align-self: center;
      margin: 14px 0;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: #dce6ff;
      font-size: 13px;
      font-weight: bold;
    }

    .status {
      padding: 0 24px 14px;
      color: #ffd6e8;
      font-size: 14px;
      min-height: 22px;
    }

    .reply-box {
      display: none;
      margin: 0 18px 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(0, 212, 255, 0.12);
      border: 1px solid rgba(0, 212, 255, 0.22);
      color: white;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .reply-box.show {
      display: flex;
    }

    .reply-box-text {
      font-size: 14px;
      line-height: 1.4;
      color: #dff8ff;
    }

    .reply-box button {
      border: none;
      background: rgba(255,255,255,0.12);
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 10px;
      cursor: pointer;
    }

    .chat-input-wrap {
      position: relative;
      border-top: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
    }

    .chat-input {
      padding: 18px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-input input {
      flex: 1;
      padding: 15px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: white;
      outline: none;
      font-size: 16px;
      min-width: 0;
    }

    .chat-input button {
      border: none;
      padding: 0 24px;
      border-radius: 18px;
      background: linear-gradient(135deg, #7c3cff, #00d4ff);
      color: white;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 14px 35px rgba(0,212,255,0.22);
    }

    .send-btn {
      height: 54px;
    }

    .emoji-toggle-btn {
      width: 46px;
      height: 46px;
      padding: 0 !important;
      border-radius: 15px !important;
      border: 1px solid rgba(255,255,255,0.14) !important;
      background: rgba(255,255,255,0.10) !important;
      color: white !important;
      font-size: 21px !important;
      cursor: pointer;
      box-shadow: none !important;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      transition: 0.2s;
    }

    .emoji-toggle-btn.active {
      background: rgba(124, 60, 255, 0.30) !important;
      border-color: rgba(0, 212, 255, 0.35) !important;
    }

    .emoji-picker {
      display: none;
      position: absolute;
      right: 118px;
      bottom: 82px;
      padding: 11px;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 330px;
      border-radius: 18px;
      background: rgba(30, 31, 50, 0.96);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 45px rgba(0,0,0,0.35);
      z-index: 50;
      backdrop-filter: blur(18px);
    }

    .emoji-picker.show {
      display: flex;
    }

    .emoji-btn {
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      cursor: pointer;
      font-size: 20px;
      transition: 0.2s;
      padding: 0;
      box-shadow: none;
    }

    .message-row.jump-highlight .bubble {
      animation: jumpFlash 1.2s ease;
      outline: 2px solid rgba(0, 212, 255, 0.8);
      box-shadow: 0 0 28px rgba(0, 212, 255, 0.45);
    }

    @keyframes jumpFlash {
      0% { transform: scale(1); }
      35% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @media (max-width: 800px) {
      body {
        padding: 0;
      }

      .private-page {
        height: 100vh;
        border-radius: 0;
        grid-template-columns: 1fr;
      }

      .sidebar {
        max-height: 245px;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.12);
      }

      .message-row {
        max-width: 88%;
      }

      .emoji-picker {
        right: 86px;
        bottom: 76px;
        max-width: 260px;
      }
    }
  </style>
</head>

<body>
  <div class="private-page">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Chat riêng 💗</h1>
        <p>Chọn một tài khoản để nhắn 1v1.</p>
        <a href="/welcome.html" class="back-btn">Trang chủ</a>
      </div>

      <div class="user-list" id="userList"></div>
    </aside>

    <main class="chat-page">
      <div class="chat-header">
        <div>
          <h1 id="chatTitle">Chưa chọn người chat</h1>
          <p id="chatSubtitle">Tin nhắn chỉ hiện giữa bạn và người được chọn.</p>
          <p id="typingText"></p>
        </div>
      </div>

      <div class="name-box">
        <label for="usernameInput">Tên của bạn:</label>
        <input id="usernameInput" placeholder="Tên sẽ tự lấy từ tài khoản đăng nhập" readonly />
      </div>

      <div class="messages" id="messages">
        <div class="empty-state">Chọn một người bên trái để bắt đầu trò chuyện riêng.</div>
      </div>

      <div class="status" id="statusText"></div>

      <div class="reply-box" id="replyBox">
        <div class="reply-box-text" id="replyBoxText"></div>
        <button onclick="cancelReply()">×</button>
      </div>

      <div class="chat-input-wrap">
        <div id="emojiPicker" class="emoji-picker">
          <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
          <button class="emoji-btn" onclick="addEmoji('😂')">😂</button>
          <button class="emoji-btn" onclick="addEmoji('🥰')">🥰</button>
          <button class="emoji-btn" onclick="addEmoji('😴')">😴</button>
          <button class="emoji-btn" onclick="addEmoji('😭')">😭</button>
          <button class="emoji-btn" onclick="addEmoji('👍')">👍</button>
          <button class="emoji-btn" onclick="addEmoji('🌙')">🌙</button>
          <button class="emoji-btn" onclick="addEmoji('✨')">✨</button>
        </div>

        <div class="chat-input">
          <input id="messageInput" placeholder="Chọn người để nhắn..." disabled />
          <button type="button" id="emojiToggleBtn" class="emoji-toggle-btn">😊</button>
          <button class="send-btn" id="sendBtn" onclick="sendPrivateMessage()" disabled>Gửi</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>

  <script>
    const socket = io();

    const userList = document.getElementById("userList");
    const usernameInput = document.getElementById("usernameInput");
    const messageInput = document.getElementById("messageInput");
    const messagesBox = document.getElementById("messages");
    const statusText = document.getElementById("statusText");
    const typingText = document.getElementById("typingText");
    const replyBox = document.getElementById("replyBox");
    const replyBoxText = document.getElementById("replyBoxText");
    const emojiToggleBtn = document.getElementById("emojiToggleBtn");
    const emojiPicker = document.getElementById("emojiPicker");
    const chatTitle = document.getElementById("chatTitle");
    const chatSubtitle = document.getElementById("chatSubtitle");
    const sendBtn = document.getElementById("sendBtn");

    let currentUser = null;
    let selectedUser = null;
    let currentConversationId = null;
    let replyingTo = null;
    let typingTimer = null;

    const savedUser = localStorage.getItem("currentUser");

    if (!savedUser) {
      alert("Bạn cần đăng nhập trước khi vào chat riêng.");
      window.location.href = "/";
    } else {
      try {
        currentUser = JSON.parse(savedUser);
        usernameInput.value = currentUser.name || currentUser.email;
      } catch (error) {
        alert("Phiên đăng nhập bị lỗi. Hãy đăng nhập lại.");
        window.location.href = "/";
      }
    }

    function escapeHTML(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getAvatarLetter(name) {
      if (!name || name.trim() === "") {
        return "?";
      }

      return name.trim().charAt(0).toUpperCase();
    }

    function formatTime(dateText) {
      const date = new Date(dateText);

      if (isNaN(date.getTime())) {
        return "";
      }

      const h = date.getHours().toString().padStart(2, "0");
      const m = date.getMinutes().toString().padStart(2, "0");

      return h + ":" + m;
    }

    function getDateKey(dateText) {
      const date = new Date(dateText);

      if (isNaN(date.getTime())) {
        return "";
      }

      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");

      return y + "-" + m + "-" + d;
    }

    function formatDateSeparator(dateText) {
      const date = new Date(dateText);

      if (isNaN(date.getTime())) {
        return "";
      }

      const today = new Date();
      const yesterday = new Date();
      yesterday.setDate(today.getDate() - 1);

      const dateKey = getDateKey(date);
      const todayKey = getDateKey(today);
      const yesterdayKey = getDateKey(yesterday);

      if (dateKey === todayKey) {
        return "Hôm nay";
      }

      if (dateKey === yesterdayKey) {
        return "Hôm qua";
      }

      const d = String(date.getDate()).padStart(2, "0");
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const y = date.getFullYear();

      return d + "/" + m + "/" + y;
    }

    async function loadUsers() {
      try {
        const response = await fetch("/api/chat-users?email=" + encodeURIComponent(currentUser.email));
        const data = await response.json();

        if (!data.success) {
          statusText.textContent = data.message || "Không lấy được danh sách người dùng.";
          return;
        }

        userList.innerHTML = "";

        if (data.users.length === 0) {
          userList.innerHTML = "<p style='color:#c7d2ff;padding:10px;'>Chưa có tài khoản khác để chat.</p>";
          return;
        }

        data.users.forEach(function (user) {
          const item = document.createElement("div");
          item.className = "user-item";
          item.dataset.email = user.email;

          item.innerHTML =
            "<div class='user-avatar'>" + escapeHTML(getAvatarLetter(user.name)) + "</div>" +
            "<div class='user-info'>" +
              "<strong>" + escapeHTML(user.name) + "</strong>" +
              "<span>" + escapeHTML(user.email) + "</span>" +
            "</div>";

          item.onclick = function () {
            openConversation(user);
          };

          userList.appendChild(item);
        });
      } catch (error) {
        statusText.textContent = "Không kết nối được server.";
      }
    }

    async function openConversation(user) {
      selectedUser = user;
      replyingTo = null;
      cancelReply();
      typingText.textContent = "";
      statusText.textContent = "";

      document.querySelectorAll(".user-item").forEach(function (item) {
        item.classList.remove("active");

        if (item.dataset.email === user.email) {
          item.classList.add("active");
        }
      });

      chatTitle.textContent = user.name;
      chatSubtitle.textContent = "Đang nhắn riêng với " + user.email;

      try {
        const response = await fetch("/api/conversation", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            currentEmail: currentUser.email,
            otherEmail: user.email
          })
        });

        const data = await response.json();

        if (!data.success) {
          statusText.textContent = data.message || "Không mở được cuộc trò chuyện.";
          return;
        }

        currentConversationId = data.conversation.id;

        socket.emit("join_private_chat", currentConversationId);

        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.placeholder = "Nhập tin nhắn...";
        messageInput.focus();

        await loadPrivateMessages();
      } catch (error) {
        statusText.textContent = "Không mở được cuộc trò chuyện.";
      }
    }

    async function loadPrivateMessages() {
      if (!currentConversationId) {
        return;
      }

      try {
        const response = await fetch(
          "/api/private-messages/" +
          currentConversationId +
          "?email=" +
          encodeURIComponent(currentUser.email)
        );

        const data = await response.json();

        if (!data.success) {
          statusText.textContent = data.message || "Không lấy được tin nhắn.";
          return;
        }

        renderMessages(data.messages);
        statusText.textContent = "";
      } catch (error) {
        statusText.textContent = "Không tải được tin nhắn.";
      }
    }

    function renderMessages(messages) {
      messagesBox.innerHTML = "";

      if (!messages || messages.length === 0) {
        messagesBox.innerHTML = "<div class='empty-state'>Chưa có tin nhắn nào. Hãy gửi lời chào đầu tiên 💗</div>";
        return;
      }

      let lastDateKey = "";

      messages.forEach(function (item) {
        const currentDateKey = getDateKey(item.created_at);

        if (currentDateKey !== lastDateKey) {
          const separator = document.createElement("div");
          separator.className = "date-separator";
          separator.textContent = formatDateSeparator(item.created_at);

          messagesBox.appendChild(separator);
          lastDateKey = currentDateKey;
        }

        addMessage(item);
      });
    }

    function addMessage(item) {
      const isMine = item.sender_email === currentUser.email;

      const emptyState = messagesBox.querySelector(".empty-state");

      if (emptyState) {
        messagesBox.innerHTML = "";
      }

      const row = document.createElement("div");
      row.className = "message-row " + (isMine ? "mine" : "other");
      row.dataset.messageId = item.id;

      const line = document.createElement("div");
      line.className = "message-line";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = getAvatarLetter(item.sender_name);

      const content = document.createElement("div");
      content.className = "message-content";

      const meta = document.createElement("div");
      meta.className = "message-meta";
      meta.textContent = item.sender_name + " • " + formatTime(item.created_at);

      content.appendChild(meta);

      if (item.reply_to_message) {
        const replyPreview = document.createElement("div");
        replyPreview.className = "reply-preview";
        replyPreview.title = "Bấm để tới tin nhắn gốc";

        replyPreview.innerHTML =
          "<strong>" +
          escapeHTML(item.reply_to_sender_name || "Người dùng") +
          "</strong><br>" +
          escapeHTML(item.reply_to_message);

        replyPreview.onclick = function () {
          jumpToMessage(item.reply_to_id);
        };

        content.appendChild(replyPreview);
      }

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = escapeHTML(item.message);

      content.appendChild(bubble);

      const tools = document.createElement("div");
      tools.className = "message-tools";

      const replyBtn = document.createElement("button");
      replyBtn.className = "reply-message-btn";
      replyBtn.textContent = "↪";
      replyBtn.onclick = function () {
        startReply(item);
      };

      tools.appendChild(replyBtn);

      if (isMine) {
        const editBtn = document.createElement("button");
        editBtn.className = "edit-message-btn";
        editBtn.textContent = "✏️";
        editBtn.onclick = function () {
          editPrivateMessage(item.id, item.message);
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-message-btn";
        deleteBtn.textContent = "🗑️";
        deleteBtn.onclick = function () {
          deletePrivateMessage(item.id);
        };

        tools.appendChild(editBtn);
        tools.appendChild(deleteBtn);
      }

      content.appendChild(tools);
      line.appendChild(avatar);
      line.appendChild(content);
      row.appendChild(line);

      messagesBox.appendChild(row);
      messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    function startReply(item) {
      replyingTo = {
        id: item.id,
        senderName: item.sender_name,
        message: item.message
      };

      replyBoxText.innerHTML =
        "Đang trả lời <strong>" +
        escapeHTML(item.sender_name) +
        "</strong>: " +
        escapeHTML(item.message);

      replyBox.classList.add("show");
      messageInput.focus();
    }

    function cancelReply() {
      replyingTo = null;
      replyBox.classList.remove("show");
      replyBoxText.textContent = "";
    }

    function addEmoji(emoji) {
      messageInput.value += emoji;
      messageInput.focus();
    }

    emojiToggleBtn.addEventListener("click", function (event) {
      event.stopPropagation();
      emojiPicker.classList.toggle("show");
      emojiToggleBtn.classList.toggle("active");
    });

    emojiPicker.addEventListener("click", function (event) {
      event.stopPropagation();
    });

    document.addEventListener("click", function () {
      emojiPicker.classList.remove("show");
      emojiToggleBtn.classList.remove("active");
    });

    function sendPrivateMessage() {
      const message = messageInput.value.trim();

      if (!currentConversationId || !selectedUser) {
        statusText.textContent = "Bạn chưa chọn người để nhắn.";
        return;
      }

      if (!message) {
        statusText.textContent = "Bạn chưa nhập tin nhắn.";
        return;
      }

      socket.emit("send_private_message", {
        conversationId: currentConversationId,
        senderEmail: currentUser.email,
        senderName: currentUser.name || currentUser.email,
        message: message,
        replyToId: replyingTo ? replyingTo.id : null,
        replyToSenderName: replyingTo ? replyingTo.senderName : null,
        replyToMessage: replyingTo ? replyingTo.message : null
      });

      socket.emit("private_stop_typing", currentConversationId);
      cancelReply();

      messageInput.value = "";
      statusText.textContent = "";
    }

    async function editPrivateMessage(messageId, oldMessage) {
      const newMessage = prompt("Nhập nội dung mới:", oldMessage);

      if (newMessage === null) {
        return;
      }

      const trimmedMessage = newMessage.trim();

      if (!trimmedMessage) {
        statusText.textContent = "Tin nhắn không được để trống.";
        return;
      }

      if (trimmedMessage.length > 500) {
        statusText.textContent = "Tin nhắn quá dài.";
        return;
      }

      try {
        const response = await fetch("/api/private-messages/" + messageId, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            senderEmail: currentUser.email,
            message: trimmedMessage
          })
        });

        const data = await response.json();

        if (!data.success) {
          statusText.textContent = data.message || "Sửa tin nhắn thất bại.";
          return;
        }

        updateMessageOnScreen(data.updatedMessage);
      } catch (error) {
        statusText.textContent = "Không sửa được tin nhắn.";
      }
    }

    function updateMessageOnScreen(item) {
      const messageElement = document.querySelector('[data-message-id="' + item.id + '"]');

      if (!messageElement) {
        return;
      }

      const bubble = messageElement.querySelector(".bubble");

      if (bubble) {
        bubble.innerHTML = escapeHTML(item.message);
      }

      let editedLabel = messageElement.querySelector(".edited-label");

      if (!editedLabel) {
        editedLabel = document.createElement("div");
        editedLabel.className = "edited-label";
        editedLabel.textContent = "Đã chỉnh sửa";

        const messageContent = messageElement.querySelector(".message-content");

        if (messageContent) {
          messageContent.appendChild(editedLabel);
        }
      }
    }

    async function deletePrivateMessage(messageId) {
      const confirmDelete = confirm("Bạn có chắc muốn xóa tin nhắn này không?");

      if (!confirmDelete) {
        return;
      }

      try {
        const response = await fetch("/api/private-messages/" + messageId, {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            senderEmail: currentUser.email
          })
        });

        const data = await response.json();

        if (!data.success) {
          statusText.textContent = data.message || "Xóa tin nhắn thất bại.";
          return;
        }

        const messageElement = document.querySelector('[data-message-id="' + messageId + '"]');

        if (messageElement) {
          messageElement.remove();
        }
      } catch (error) {
        statusText.textContent = "Không xóa được tin nhắn.";
      }
    }

    function jumpToMessage(messageId) {
      if (!messageId) {
        return;
      }

      const target = document.querySelector('[data-message-id="' + messageId + '"]');

      if (!target) {
        statusText.textContent = "Tin nhắn gốc không còn trong danh sách hiện tại.";

        setTimeout(function () {
          statusText.textContent = "";
        }, 2500);

        return;
      }

      target.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });

      target.classList.add("jump-highlight");

      setTimeout(function () {
        target.classList.remove("jump-highlight");
      }, 1300);
    }

    socket.on("receive_private_message", function (message) {
      if (Number(message.conversation_id) !== Number(currentConversationId)) {
        return;
      }

      addMessage(message);
    });

    socket.on("edit_private_message", function (updatedMessage) {
      if (Number(updatedMessage.conversation_id) !== Number(currentConversationId)) {
        return;
      }

      updateMessageOnScreen(updatedMessage);
    });

    socket.on("delete_private_message", function (messageId) {
      const messageElement = document.querySelector('[data-message-id="' + messageId + '"]');

      if (messageElement) {
        messageElement.remove();
      }
    });

    socket.on("private_user_typing", function (username) {
      if (username && username !== usernameInput.value.trim()) {
        typingText.textContent = username + " đang nhập...";
      }
    });

    socket.on("private_user_stop_typing", function () {
      typingText.textContent = "";
    });

    messageInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        sendPrivateMessage();
        return;
      }

      if (!currentConversationId) {
        return;
      }

      socket.emit("private_typing", {
        conversationId: currentConversationId,
        username: currentUser.name || currentUser.email
      });

      clearTimeout(typingTimer);

      typingTimer = setTimeout(function () {
        socket.emit("private_stop_typing", currentConversationId);
      }, 1000);
    });

    loadUsers();
  </script>
</body>
</html>
